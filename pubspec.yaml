name: accidentdetection
description: "For Safety"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Sensors
  sensors_plus: ^7.0.0

  # Location
  geolocator: ^14.0.0
  permission_handler: ^12.0.0
  google_maps_flutter: ^2.17.0

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Background
  flutter_background_service: ^5.0.5

  # Storage
  sqflite: ^2.3.2
  path: ^1.9.0

  # SMS (telephony is discontinued — use this instead)
  flutter_sms: ^2.3.3
  url_launcher: ^6.3.0

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_messaging: ^16.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true